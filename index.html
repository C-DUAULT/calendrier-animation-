<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Planning NOA — Été 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f2ed;
  --surface: #faf8f5;
  --white: #ffffff;
  --border: #e2ddd6;
  --border-light: #ece9e2;
  --text: #1a1714;
  --text-muted: #7a746c;
  --text-faint: #b0a99f;
  --accent: #2d5a3d;
  --accent-light: #e8f0eb;
  --accent-mid: #4a8c5c;
  --danger: #993c1d;
  --danger-bg: #faece7;
  --warning: #854f0b;
  --warning-bg: #faeeda;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* TOPBAR MOBILE */
.topbar {
  position:fixed; top:0; left:0; right:0; z-index:200;
  background:var(--white); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; height:56px;
}
.topbar-left { display:flex; align-items:center; gap:12px; }
.hamburger { width:40px; height:40px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; cursor:pointer; border:none; background:none; border-radius:8px; }
.hamburger span { display:block; width:20px; height:2px; background:var(--text); border-radius:2px; transition:all 0.25s; }
.hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity:0; }
.hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
.topbar-brand { font-family:'DM Serif Display',serif; font-size:18px; }
.topbar-brand small { display:block; font-family:'DM Sans',sans-serif; font-size:10px; color:var(--text-muted); font-weight:400; margin-top:-2px; }
.topbar-add { width:36px; height:36px; border-radius:50%; background:var(--accent); color:white; border:none; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

/* DRAWER MENU */
.drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:300; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.drawer-overlay.open { opacity:1; pointer-events:all; }
.drawer { position:fixed; top:0; left:0; bottom:0; width:280px; background:var(--white); z-index:400; transform:translateX(-100%); transition:transform 0.28s cubic-bezier(0.4,0,0.2,1); overflow-y:auto; display:flex; flex-direction:column; }
.drawer.open { transform:translateX(0); }
.drawer-brand { padding:24px 20px 16px; border-bottom:1px solid var(--border-light); }
.brand-tag { font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent-mid); margin-bottom:4px; }
.brand-name { font-family:'DM Serif Display',serif; font-size:22px; line-height:1.1; }
.brand-sub { font-size:12px; color:var(--text-muted); margin-top:3px; }
.drawer-section { padding:12px 0; }
.drawer-label { font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-faint); padding:0 20px; margin-bottom:4px; }
.nav-item { display:flex; align-items:center; gap:12px; padding:12px 20px; cursor:pointer; font-size:15px; color:var(--text-muted); border-left:3px solid transparent; transition:all 0.15s; }
.nav-item:active { background:var(--bg); }
.nav-item.active { color:var(--text); background:var(--bg); border-left-color:var(--accent); font-weight:500; }
.nav-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0; }
.alert-dot { width:8px; height:8px; border-radius:50%; background:#e24b4a; margin-left:auto; flex-shrink:0; }
.drawer-footer { margin-top:auto; padding:16px 20px; border-top:1px solid var(--border-light); font-size:12px; color:var(--text-faint); }

/* CONTENT */
.main { padding-top:56px; padding-bottom:80px; min-height:100vh; }
.content { padding:16px; }
.view { display:none; }
.view.active { display:block; }

/* BOTTOM NAV */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  background:var(--white); border-top:1px solid var(--border);
  display:flex; align-items:center;
  padding-bottom:env(safe-area-inset-bottom);
}
.bottom-nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 4px 8px; cursor:pointer; color:var(--text-muted); font-size:10px; gap:4px; border:none; background:none; font-family:'DM Sans',sans-serif; transition:color 0.15s; position:relative; }
.bottom-nav-item.active { color:var(--accent); }
.bottom-nav-item svg { transition:transform 0.15s; }
.bottom-nav-item.active svg { transform:scale(1.15); }
.bnav-dot { position:absolute; top:8px; right:calc(50% - 14px); width:7px; height:7px; border-radius:50%; background:#e24b4a; }

/* STATS */
.stats-scroll { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px; scrollbar-width:none; }
.stats-scroll::-webkit-scrollbar { display:none; }
.stat-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:14px 16px; flex-shrink:0; min-width:110px; }
.stat-val { font-size:26px; font-weight:600; line-height:1; }
.stat-lbl { font-size:11px; color:var(--text-muted); margin-top:3px; }

/* MONTH SECTION */
.month-header { display:flex; align-items:center; justify-content:space-between; margin:20px 0 10px; }
.month-title-txt { font-family:'DM Serif Display',serif; font-size:20px; }
.month-count-badge { font-size:11px; background:var(--accent-light); color:var(--accent); padding:2px 8px; border-radius:10px; font-weight:500; }

/* EVENT CARDS */
.event-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:8px; display:flex; gap:12px; align-items:flex-start; }
.event-card:active { background:var(--bg); }
.event-date { min-width:42px; text-align:center; padding-top:2px; }
.event-date-num { font-size:22px; font-weight:700; line-height:1; }
.event-date-day { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; }
.event-body { flex:1; min-width:0; }
.event-lieu { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:5px; }
.event-tags { display:flex; flex-wrap:wrap; gap:5px; align-items:center; }
.event-actions { display:flex; gap:6px; align-items:center; flex-shrink:0; }

/* TAGS */
.tag { display:inline-block; font-size:10px; font-weight:600; padding:2px 7px; border-radius:5px; }
.tag-slot1 { background:#e8f0fb; color:#1a4a8a; }
.tag-slot2 { background:#eaf4e2; color:#3a6e18; }
.tag-tbd { background:var(--warning-bg); color:var(--warning); }
.tag-ok { background:var(--accent-light); color:var(--accent); }
.tag-j1 { background:var(--danger-bg); color:var(--danger); }
.tag-j7 { background:var(--warning-bg); color:var(--warning); }
.tag-format { background:var(--accent-light); color:var(--accent); }
.tag-confirm { background:var(--danger-bg); color:var(--danger); }

/* ANIM HERO */
.anim-hero { background:var(--white); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:16px; display:flex; align-items:center; gap:16px; }
.anim-avatar { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; flex-shrink:0; }
.anim-hero-name { font-family:'DM Serif Display',serif; font-size:22px; }
.anim-hero-meta { font-size:12px; color:var(--text-muted); margin-top:2px; }
.anim-hero-stats { display:flex; gap:16px; margin-top:8px; }
.anim-stat strong { display:block; font-size:18px; font-weight:600; line-height:1.1; }
.anim-stat { font-size:12px; color:var(--text-muted); }

/* RAPPELS */
.rappel-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
.rappel-card-tbd { border-left:3px solid #f09595; }
.rappel-info { flex:1; min-width:0; }
.rappel-lieu { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rappel-who { font-size:11px; color:var(--text-muted); margin-top:2px; display:flex; align-items:center; gap:5px; }
.rappel-date-txt { font-size:11px; color:var(--text-muted); white-space:nowrap; }
.section-title { font-size:13px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; margin:20px 0 8px; display:flex; align-items:center; gap:8px; }

/* ADMIN */
.admin-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:8px; display:flex; align-items:center; gap:12px; }
.admin-info { flex:1; min-width:0; }
.admin-name { font-size:14px; font-weight:500; }
.admin-sub { font-size:12px; color:var(--text-muted); margin-top:2px; }
.admin-actions { display:flex; gap:6px; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 16px; border-radius:10px; font-size:14px; font-weight:500; cursor:pointer; font-family:'DM Sans',sans-serif; border:1px solid; transition:all 0.15s; }
.btn:active { opacity:0.85; transform:scale(0.98); }
.btn-primary { background:var(--accent); color:white; border-color:var(--accent); }
.btn-secondary { background:var(--white); color:var(--text); border-color:var(--border); }
.btn-danger { background:var(--danger-bg); color:var(--danger); border-color:#f0c0a8; }
.btn-sm { padding:6px 12px; font-size:12px; border-radius:8px; }
.btn-icon { width:34px; height:34px; padding:0; border-radius:8px; }
.btn-block { width:100%; margin-top:8px; border-style:dashed; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:500; display:none; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal-box { background:var(--white); border-radius:20px 20px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); width:100%; max-width:600px; max-height:90vh; overflow-y:auto; }
.modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
.modal-title { font-family:'DM Serif Display',serif; font-size:20px; margin-bottom:16px; }
.field { margin-bottom:12px; }
.field label { display:block; font-size:11px; font-weight:600; letter-spacing:0.04em; color:var(--text-muted); margin-bottom:4px; text-transform:uppercase; }
.field input, .field select { width:100%; padding:11px 14px; border:1px solid var(--border); border-radius:10px; font-size:16px; font-family:'DM Sans',sans-serif; color:var(--text); background:var(--surface); outline:none; }
.field input:focus, .field select:focus { border-color:var(--accent-mid); }
.modal-actions { display:flex; gap:8px; margin-top:16px; }
.modal-actions .btn { flex:1; padding:13px; }

/* CONFIRM */
.confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:600; display:none; align-items:flex-end; justify-content:center; }
.confirm-overlay.open { display:flex; }
.confirm-box { background:var(--white); border-radius:20px 20px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); width:100%; max-width:600px; }
.confirm-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
.confirm-title { font-size:17px; font-weight:600; margin-bottom:8px; }
.confirm-text { font-size:13px; color:var(--text-muted); line-height:1.6; margin-bottom:20px; }
.confirm-actions { display:flex; gap:8px; }
.confirm-actions .btn { flex:1; padding:13px; }

/* COLOR PICKER */
.color-picker-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; }
.color-opt { width:32px; height:32px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:all 0.15s; }
.color-opt.selected { border-color:var(--text); transform:scale(1.15); }

/* EMPTY */
.empty-box { border:1px dashed var(--border); border-radius:12px; padding:24px; text-align:center; font-size:13px; color:var(--text-faint); }

/* TOAST */
.toast { position:fixed; bottom:calc(72px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%) translateY(12px); background:var(--text); color:white; padding:10px 20px; border-radius:20px; font-size:13px; z-index:700; opacity:0; transition:all 0.2s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

.no-anim { text-align:center; color:var(--text-faint); font-size:13px; padding:20px; }
</style>
</head>
<body>

  {date:'2026-07-07',lieu:'Camping Touesse – Dinard (35)',animateur:'Solal',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-07-08',lieu:"Camping Blé d'Or – St Cast le Guildo (35)",animateur:'Solal',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-07-09',lieu:'Camping Port Blanc – Dinard (35)',animateur:'Solal',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-07-10',lieu:'Fouesnant – Leclerc (29)',animateur:'Nina',format:'10-13 / 14-18',slot:'Anim 1',confirmed:false},
  {date:'2026-07-13',lieu:'Camping Le Milin – Pabu (22)',animateur:'Solal',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-07-14',lieu:'Camping Le Roch – Pordic (22)',animateur:'Solal',format:'',slot:'Anim 1',confirmed:true},

  {date:'2026-07-17',lieu:'Gueule de joie – Nantes (44)',animateur:'Nina',format:'',slot:'Anim 2',confirmed:false},
  {date:'2026-07-20',lieu:'Camping St Cado – Belz (56)',animateur:'Solal',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-08-08',lieu:"Les Bouchées d'Alexandre – Plouharnel (56)",animateur:'?',format:'',slot:'Anim 1',confirmed:false},
  {date:'2026-08-14',lieu:'Fouesnant – Leclerc (29)',animateur:'?',format:'',slot:'Anim 1',confirmed:false},
];

let currentTab='general';
let currentAnimateur=null;

// HELPERS
function getMonth(d){return MONTHS_FR[parseInt(d.split('-')[1])-1];}
function dayNum(d){return parseInt(d.split('-')[2]);}
function dayName(d){return DAYS[new Date(d+'T00:00:00').getDay()];}
function daysUntil(d){const t=new Date();t.setHours(0,0,0,0);return Math.round((new Date(d+'T00:00:00')-t)/86400000);}
function fmtDate(d){const dt=new Date(d+'T00:00:00');return DAYS[dt.getDay()]+' '+dt.getDate()+' '+MONTHS_FR[dt.getMonth()];}
function getColor(name){const a=ANIMATEURS.find(a=>a.name===name);return a?a.color:{dot:'#888780',bg:'#f1efe8',text:'#444441'};}
function initials(name){if(!name||name==='?')return '?';const p=name.trim().split(' ');return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():name.substring(0,2).toUpperCase();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// DRAWER
function toggleDrawer(){
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('drawer-overlay').classList.toggle('open');
  document.getElementById('hamburger').classList.toggle('open');
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
}

// SIDEBAR BUILD
function buildDrawer(){
  document.getElementById('drawer-animateurs').innerHTML=ANIMATEURS.map(a=>`
    <div class="nav-item${currentTab==='anim-'+a.name?' active':''}" onclick="navToAnimateur('${a.name}',this)">
      <div class="nav-avatar" style="background:${a.color.bg};color:${a.color.dot};">${initials(a.name)}</div>
      ${a.name}
    </div>
  `).join('');
}

// NAVIGATION
function navTo(id, drawerEl, bnavId){
  currentTab=id; currentAnimateur=null;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  if(drawerEl) drawerEl.classList.add('active');
  if(bnavId) document.getElementById('bnav-'+bnavId).classList.add('active');
  closeDrawer();
  if(id==='general') renderGeneral();
  if(id==='rappels') renderRappels();
  if(id==='admin') renderAdmin();
}

function navToAnimateur(name, drawerEl){
  currentTab='anim-'+name; currentAnimateur=name;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-animateur').classList.add('active');
  if(drawerEl) drawerEl.classList.add('active');
  closeDrawer();
  renderAnimateur(name);
}

// GENERAL
function renderGeneral(){
  const counts={};ANIMATEURS.forEach(a=>counts[a.name]=0);
  DATA.forEach(d=>{if(counts[d.animateur]!==undefined)counts[d.animateur]++;});
  const monthGroups={'Juin':[],'Juillet':[],'Août':[]};
  DATA.forEach(d=>{const m=getMonth(d.date);if(monthGroups[m])monthGroups[m].push(d);});

  let html=`<div class="stats-scroll">
    <div class="stat-card"><div class="stat-val">${DATA.length}</div><div class="stat-lbl">Total</div></div>
    ${ANIMATEURS.map(a=>`<div class="stat-card" style="border-left:3px solid ${a.color.dot}"><div class="stat-val">${counts[a.name]||0}</div><div class="stat-lbl" style="color:${a.color.dot};">${a.name}</div></div>`).join('')}
    <div class="stat-card" style="border-left:3px solid #e24b4a"><div class="stat-val">${DATA.filter(d=>!d.confirmed||d.animateur==='?').length}</div><div class="stat-lbl" style="color:var(--danger);">À décerner</div></div>
  </div>`;

  Object.entries(monthGroups).forEach(([month,items])=>{
    items.sort((a,b)=>a.date.localeCompare(b.date));
    html+=`<div class="month-header"><div class="month-title-txt">${month}</div><span class="month-count-badge">${items.length} anim.</span></div>`;
    if(!items.length){html+='<div class="empty-box">Aucune animation</div>';}
    else items.forEach(d=>{html+=eventCard(d,DATA.indexOf(d),true);});
  });
  document.getElementById('view-general').innerHTML=html;
}

function eventCard(d,idx,showAnim){
  const c=getColor(d.animateur);
  const diff=daysUntil(d.date);
  let rem='';
  if(diff>=0&&diff<=1)rem='<span class="tag tag-j1">J-1</span>';
  else if(diff>=0&&diff<=7)rem='<span class="tag tag-j7">J-7</span>';
  return `<div class="event-card">
    <div class="event-date"><div class="event-date-num">${dayNum(d.date)}</div><div class="event-date-day">${dayName(d.date)}</div></div>
    <div class="event-body">
      <div class="event-lieu">${d.lieu}</div>
      <div class="event-tags">
        ${showAnim?`<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:${c.dot};"><span style="width:7px;height:7px;border-radius:50%;background:${c.dot};display:inline-block;"></span>${d.animateur}</span>`:''}
        <span class="tag ${d.slot==='Anim 1'?'tag-slot1':'tag-slot2'}">${d.slot}</span>
        ${d.format?'<span class="tag tag-format">'+d.format+'</span>':''}
        ${!d.confirmed||d.animateur==='?'?'<span class="tag tag-tbd">À décerner</span>':''}
        ${d.note?'<span class="tag tag-confirm">⚠ '+d.note+'</span>':''}
        ${rem}
      </div>
    </div>
    <div class="event-actions">
      <button class="btn btn-secondary btn-icon btn-sm" onclick="editEvent(${idx})" aria-label="Modifier">✏️</button>
    </div>
  </div>`;
}

// RAPPELS
function renderRappels(){
  const soon=DATA.filter(d=>{const diff=daysUntil(d.date);return diff>=0&&diff<=14;}).sort((a,b)=>a.date.localeCompare(b.date));
  const tbd=DATA.filter(d=>d.animateur==='?'||!d.confirmed).sort((a,b)=>a.date.localeCompare(b.date));
  const hasAlerts=(soon.length+tbd.length)>0;
  ['alert-dot-drawer','bnav-dot'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.style.display=hasAlerts?'inline-block':'none';
  });

  let html=`<div class="section-title">🔔 Dans les 14 prochains jours</div>`;
  if(!soon.length){html+='<div class="empty-box">Aucune animation prochainement</div>';}
  else soon.forEach(d=>{
    const diff=daysUntil(d.date);
    const c=getColor(d.animateur);
    let badge=diff<=1?'<span class="tag tag-j1">J-1</span>':diff<=7?'<span class="tag tag-j7">J-7</span>':'<span class="tag tag-ok">J-'+diff+'</span>';
    html+=`<div class="rappel-card">${badge}<div class="rappel-info"><div class="rappel-lieu">${d.lieu}</div><div class="rappel-who"><span style="width:7px;height:7px;border-radius:50%;background:${c.dot};display:inline-block;"></span>${d.animateur}</div></div><div class="rappel-date-txt">${fmtDate(d.date)}</div></div>`;
  });

  html+=`<div class="section-title" style="color:var(--danger);">⚠️ À décerner (${tbd.length})</div>`;
  if(!tbd.length){html+='<div class="empty-box">Tous les créneaux sont attribués ✓</div>';}
  else tbd.forEach(d=>{
    html+=`<div class="rappel-card rappel-card-tbd"><span class="tag tag-tbd">À décerner</span><div class="rappel-info"><div class="rappel-lieu">${d.lieu}</div><div class="rappel-who" style="color:var(--warning);">${d.animateur}${d.note?' · '+d.note:''}</div></div><div class="rappel-date-txt">${fmtDate(d.date)}</div></div>`;
  });
  document.getElementById('view-rappels').innerHTML=html;
}

// ANIMATEUR
function renderAnimateur(name){
  const myData=DATA.filter(d=>d.animateur===name).sort((a,b)=>a.date.localeCompare(b.date));
  const c=getColor(name);
  const months=['Juin','Juillet','Août'];
  let html=`<div class="anim-hero">
    <div class="anim-avatar" style="background:${c.bg};color:${c.dot};">${initials(name)}</div>
    <div>
      <div class="anim-hero-name">${name}</div>
      <div class="anim-hero-meta">Animateur · NOA Été 2026</div>
      <div class="anim-hero-stats">
        <div class="anim-stat"><strong>${myData.length}</strong>animations</div>
        <div class="anim-stat"><strong>${myData.filter(d=>d.confirmed).length}</strong>confirmées</div>
        <div class="anim-stat"><strong>${myData.filter(d=>!d.confirmed).length}</strong>à confirmer</div>
      </div>
    </div>
  </div>`;
  months.forEach(m=>{
    const mData=myData.filter(d=>getMonth(d.date)===m);
    html+=`<div class="month-header"><div class="month-title-txt">${m}</div><span class="month-count-badge">${mData.length} anim.</span></div>`;
    if(!mData.length){html+='<div class="empty-box">Aucune animation en '+m+'</div>';}
    else mData.forEach(d=>{html+=eventCard(d,DATA.indexOf(d),false);});
    html+=`<button class="btn btn-secondary btn-block" onclick="openModalForAnimateur('${name}','${m}')">+ Ajouter en ${m}</button>`;
  });
  document.getElementById('view-animateur').innerHTML=html;
}

// ADMIN
function renderAdmin(){
  let html=`<div class="section-title">Animateurs</div>`;
  ANIMATEURS.forEach((a,i)=>{
    const count=DATA.filter(d=>d.animateur===a.name).length;
    html+=`<div class="admin-card">
      <div class="nav-avatar" style="width:40px;height:40px;font-size:14px;background:${a.color.bg};color:${a.color.dot};">${initials(a.name)}</div>
      <div class="admin-info"><div class="admin-name">${a.name}</div><div class="admin-sub">${count} animation${count>1?'s':''}</div></div>
      <div class="admin-actions">
        <button class="btn btn-secondary btn-icon btn-sm" onclick="editProfil(${i})">✏️</button>
        <button class="btn btn-danger btn-icon btn-sm" onclick="confirmDeleteAnimateur(${i})">🗑</button>
      </div>
    </div>`;
  });
  html+=`<button class="btn btn-primary" style="width:100%;margin-bottom:24px;" onclick="openModal('profil')">+ Ajouter un animateur</button>`;
  html+=`<div class="section-title">Toutes les animations <span style="font-size:11px;font-weight:400;color:var(--text-faint);">${DATA.length}</span></div>`;
  [...DATA].sort((a,b)=>a.date.localeCompare(b.date)).forEach(d=>{
    const idx=DATA.indexOf(d);
    const c=getColor(d.animateur);
    html+=`<div class="admin-card">
      <div style="min-width:40px;text-align:center;"><div style="font-size:18px;font-weight:700;line-height:1;">${dayNum(d.date)}</div><div style="font-size:10px;color:var(--text-muted);">${dayName(d.date)}</div></div>
      <div class="admin-info">
        <div class="admin-name">${d.lieu}</div>
        <div class="admin-sub" style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
          <span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;"><span style="width:6px;height:6px;border-radius:50%;background:${c.dot};display:inline-block;"></span>${d.animateur}</span>
          <span class="tag ${d.slot==='Anim 1'?'tag-slot1':'tag-slot2'}">${d.slot}</span>
          ${!d.confirmed||d.animateur==='?'?'<span class="tag tag-tbd">À décerner</span>':''}
        </div>
      </div>
      <div class="admin-actions">
        <button class="btn btn-secondary btn-icon btn-sm" onclick="editEvent(${idx})">✏️</button>
        <button class="btn btn-danger btn-icon btn-sm" onclick="confirmDeleteEvent(${idx})">🗑</button>
      </div>
    </div>`;
  });
  document.getElementById('view-admin').innerHTML=html;
}

// MODAL EVENT
function buildAnimateurSelect(selected){
  const sel=document.getElementById('f-animateur');
  sel.innerHTML=`<option value="?">— À décerner —</option>`+ANIMATEURS.map(a=>`<option value="${a.name}"${a.name===selected?' selected':''}>${a.name}</option>`).join('');
  if(selected) sel.value=selected;
}
function openModal(type){
  if(type==='event'){
    document.getElementById('modal-event-title').textContent='Nouvelle animation';
    document.getElementById('f-event-idx').value='-1';
    ['f-date','f-lieu','f-format'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-slot').value='Anim 1';
    document.getElementById('f-confirmed').value='1';
    buildAnimateurSelect('');
  } else {
    document.getElementById('modal-profil-title').textContent='Ajouter un animateur';
    document.getElementById('f-profil-old-name').value='';
    document.getElementById('f-profil-name').value='';
    buildColorPicker(COLOR_PALETTE[0].name);
  }
  document.getElementById('modal-'+type).classList.add('open');
}
function openModalForAnimateur(name,month){
  openModal('event');
  buildAnimateurSelect(name);
  const map={Juin:'2026-06-01',Juillet:'2026-07-01',Août:'2026-08-01'};
  if(map[month])document.getElementById('f-date').value=map[month];
}
function editEvent(idx){
  const d=DATA[idx];
  document.getElementById('modal-event-title').textContent='Modifier l\'animation';
  document.getElementById('f-event-idx').value=idx;
  document.getElementById('f-date').value=d.date;
  document.getElementById('f-lieu').value=d.lieu;
  document.getElementById('f-format').value=d.format||'';
  document.getElementById('f-slot').value=d.slot;
  document.getElementById('f-confirmed').value=d.confirmed?'1':'0';
  buildAnimateurSelect(d.animateur);
  document.getElementById('modal-event').classList.add('open');
}
function closeModal(type){document.getElementById('modal-'+type).classList.remove('open');}
function saveEvent(){
  const idx=parseInt(document.getElementById('f-event-idx').value);
  const date=document.getElementById('f-date').value;
  const lieu=document.getElementById('f-lieu').value.trim();
  const animateur=document.getElementById('f-animateur').value;
  const format=document.getElementById('f-format').value.trim();
  const slot=document.getElementById('f-slot').value;
  const confirmed=document.getElementById('f-confirmed').value==='1';
  if(!date||!lieu){alert('Merci de remplir la date et le lieu.');return;}
  if(idx===-1){DATA.push({date,lieu,animateur:animateur||'?',format,slot,confirmed});showToast('Animation ajoutée ✓');}
  else{DATA[idx]={...DATA[idx],date,lieu,animateur:animateur||'?',format,slot,confirmed};showToast('Animation modifiée ✓');}
  closeModal('event');
  refreshCurrentView();
}

// MODAL PROFIL
function buildColorPicker(selectedName){
  document.getElementById('color-picker').innerHTML=COLOR_PALETTE.map(c=>`<div class="color-opt${c.name===selectedName?' selected':''}" style="background:${c.dot};" onclick="selectColor('${c.name}')" title="${c.name}"></div>`).join('');
  document.getElementById('f-profil-color').value=selectedName;
}
function selectColor(name){
  document.querySelectorAll('.color-opt').forEach(o=>o.classList.remove('selected'));
  event.target.classList.add('selected');
  document.getElementById('f-profil-color').value=name;
}
function editProfil(i){
  const a=ANIMATEURS[i];
  document.getElementById('modal-profil-title').textContent='Modifier l\'animateur';
  document.getElementById('f-profil-old-name').value=a.name;
  document.getElementById('f-profil-name').value=a.name;
  buildColorPicker(a.color.name);
  document.getElementById('modal-profil').classList.add('open');
}
function saveProfil(){
  const oldName=document.getElementById('f-profil-old-name').value;
  const name=document.getElementById('f-profil-name').value.trim();
  const colorName=document.getElementById('f-profil-color').value;
  const color=COLOR_PALETTE.find(c=>c.name===colorName)||COLOR_PALETTE[0];
  if(!name){alert('Merci de saisir un prénom.');return;}
  if(oldName){
    const idx=ANIMATEURS.findIndex(a=>a.name===oldName);
    ANIMATEURS[idx]={name,color};
    DATA.forEach(d=>{if(d.animateur===oldName)d.animateur=name;});
    showToast('Animateur modifié ✓');
  } else {
    if(ANIMATEURS.find(a=>a.name===name)){alert('Ce nom existe déjà.');return;}
    ANIMATEURS.push({name,color});
    showToast('Animateur ajouté ✓');
  }
  closeModal('profil');
  buildDrawer();
  refreshCurrentView();
}

// SUPPRESSION
function confirmDeleteAnimateur(i){
  const a=ANIMATEURS[i];
  const count=DATA.filter(d=>d.animateur===a.name).length;
  document.getElementById('confirm-title').textContent='Supprimer '+a.name+' ?';
  document.getElementById('confirm-text').innerHTML=`Vous allez supprimer <strong>${a.name}</strong>.${count>0?`<br><br><span style="color:var(--warning);">⚠️ ${count} animation${count>1?'s':''} ${count>1?'seront passées':'sera passée'} en mode <strong>« À décerner »</strong>.</span>`:''}`;
  document.getElementById('confirm-ok-btn').onclick=()=>deleteAnimateur(i);
  document.getElementById('confirm-overlay').classList.add('open');
}
function confirmDeleteEvent(idx){
  const d=DATA[idx];
  document.getElementById('confirm-title').textContent='Supprimer cette animation ?';
  document.getElementById('confirm-text').innerHTML=`<strong>${d.lieu}</strong><br>${fmtDate(d.date)}`;
  document.getElementById('confirm-ok-btn').onclick=()=>deleteEvent(idx);
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('open');}
function deleteAnimateur(i){
  const name=ANIMATEURS[i].name;
  DATA.forEach(d=>{if(d.animateur===name){d.animateur='?';d.confirmed=false;}});
  ANIMATEURS.splice(i,1);
  closeConfirm(); buildDrawer();
  if(currentTab==='anim-'+name)navTo('general',null,'general');
  else refreshCurrentView();
  showToast('Animateur supprimé — animations passées en « À décerner »');
}
function deleteEvent(idx){DATA.splice(idx,1);closeConfirm();refreshCurrentView();showToast('Animation supprimée ✓');}

function refreshCurrentView(){
  if(currentTab==='general')renderGeneral();
  else if(currentTab==='rappels')renderRappels();
  else if(currentTab==='admin')renderAdmin();
  else if(currentAnimateur)renderAnimateur(currentAnimateur);
}

// INIT
buildDrawer();
renderGeneral();
renderRappels();
</script>
</body>
</html>
