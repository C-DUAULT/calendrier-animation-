<style>
:root{
  --bg:#f5f2ec;
  --surface:#faf8f4;
  --white:#ffffff;
  --border:#ddd8cf;
  --border-light:#e8e3da;
  --text:#1c2b1e;
  --text-muted:#6b7a5e;
  --text-faint:#a8b09a;
  --accent:#1c4a2e;
  --accent-light:#e4ede6;
  --accent-mid:#2d6b42;
  --danger:#8c2d1a;
  --danger-bg:#f9ebe7;
  --warning:#7a4a0a;
  --warning-bg:#faeedd;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:58px;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.hamburger{width:40px;height:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;border:none;background:none;flex-shrink:0;}
.hamburger span{display:block;width:20px;height:1.5px;background:var(--accent);border-radius:2px;transition:all 0.25s;}
.hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}
.topbar-logo{height:28px;width:auto;object-fit:contain;}
.topbar-name{font-family:'DM Serif Display',serif;font-size:13px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.topbar-add{width:36px;height:36px;border-radius:50%;background:var(--accent);color:white;border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;}
.user-badge{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text);}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(10,20,12,0.45);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--white);z-index:400;transform:translateX(-100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);overflow-y:auto;display:flex;flex-direction:column;}
.drawer.open{transform:translateX(0);}
.drawer-brand{padding:28px 20px 20px;border-bottom:1px solid var(--border-light);text-align:center;}
.drawer-logo{height:44px;width:auto;object-fit:contain;margin-bottom:10px;}
.drawer-sub{font-size:11px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;}
.drawer-section{padding:12px 0;}
.drawer-label{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-faint);padding:0 20px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;font-size:14px;color:var(--text-muted);border-left:3px solid transparent;transition:all 0.15s;}
.nav-item.active{color:var(--accent);background:var(--accent-light);border-left-color:var(--accent);font-weight:500;}
.nav-item:active{background:var(--bg);}
.nav-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;letter-spacing:0.02em;}
.drawer-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border-light);font-size:10px;color:var(--text);font-weight:600;letter-spacing:0.04em;}

/* MAIN */
.main{padding-top:58px;padding-bottom:88px;min-height:100vh;}
.content{padding:16px;}
.view{display:none;}.view.active{display:block;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--white);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;color:var(--text-faint);font-size:10px;gap:3px;border:none;background:none;font-family:'DM Sans',sans-serif;transition:color 0.15s;position:relative;letter-spacing:0.04em;}
.bnav-item.active{color:var(--accent);}
.bnav-dot{position:absolute;top:8px;right:calc(50% - 14px);width:7px;height:7px;border-radius:50%;background:#c0392b;display:none;}

/* STATS */
.stats-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;scrollbar-width:none;}
.stats-scroll::-webkit-scrollbar{display:none;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:14px 16px;flex-shrink:0;min-width:100px;}
.stat-val{font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;line-height:1;color:var(--accent);}
.stat-lbl{font-size:10px;color:var(--text-muted);margin-top:4px;letter-spacing:0.04em;text-transform:uppercase;}

/* MONTH */
.month-header{display:flex;align-items:center;justify-content:space-between;margin:22px 0 12px;}
.month-title-txt{font-family:'DM Serif Display',serif;font-size:22px;font-style:italic;color:var(--accent);}
.month-badge{font-size:10px;background:var(--accent-light);color:var(--accent-mid);padding:3px 10px;border-radius:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;}

/* EVENT CARD */
.event-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;transition:border-color 0.15s;}
.event-card:active{border-color:var(--accent-mid);}
.event-date{min-width:40px;text-align:center;padding-top:2px;flex-shrink:0;}
.event-date-num{font-family:'DM Serif Display',serif;font-size:24px;font-weight:400;line-height:1;color:var(--accent);}
.event-date-day{font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.08em;margin-top:1px;}
.event-body{flex:1;min-width:0;}
.event-lieu{font-size:14px;font-weight:500;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.event-tags{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.event-actions{display:flex;gap:5px;flex-shrink:0;align-items:flex-start;padding-top:2px;}

/* TAGS */
.tag{display:inline-block;font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;letter-spacing:0.03em;text-transform:uppercase;}
.tag-s1{background:#e4ede6;color:#1c4a2e;}
.tag-s2{background:#e8f4e2;color:#2a5a1a;}
.tag-tbd{background:var(--warning-bg);color:var(--warning);}
.tag-ok{background:var(--accent-light);color:var(--accent);}
.tag-j1{background:var(--danger-bg);color:var(--danger);}
.tag-j7{background:var(--warning-bg);color:var(--warning);}
.tag-fmt{background:var(--accent-light);color:var(--accent);}
.tag-note{background:var(--danger-bg);color:var(--danger);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid;transition:all 0.15s;letter-spacing:0.02em;}
.btn:active{opacity:0.82;transform:scale(0.97);}
.btn-primary{background:var(--accent);color:white;border-color:var(--accent);}
.btn-primary:hover{background:#163d24;}
.btn-secondary{background:var(--white);color:var(--text);border-color:var(--border);}
.btn-danger{background:var(--danger-bg);color:var(--danger);border-color:#e8c0b0;}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:7px;}
.btn-icon{width:30px;height:30px;padding:0;border-radius:7px;font-size:13px;}
.btn-dashed{width:100%;margin-top:8px;border-style:dashed;background:transparent;color:var(--text-muted);border-color:var(--border);font-family:'DM Sans',sans-serif;}

/* HERO ANIMATEUR */
.anim-hero{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;display:flex;align-items:center;gap:18px;}
.anim-avatar-big{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;letter-spacing:0.02em;}
.anim-hero-name{font-family:'DM Serif Display',serif;font-size:24px;color:var(--accent);}
.anim-hero-meta{font-size:11px;color:var(--text-muted);margin-top:2px;letter-spacing:0.04em;text-transform:uppercase;}
.anim-hero-stats{display:flex;gap:18px;margin-top:10px;}
.anim-stat strong{display:block;font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;color:var(--accent);line-height:1.1;}
.anim-stat{font-size:11px;color:var(--text-muted);letter-spacing:0.02em;}

/* RAPPELS */
.section-title{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin:22px 0 10px;display:flex;align-items:center;gap:8px;}
.rappel-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.rappel-card-tbd{border-left:3px solid #e8a898;}
.rappel-info{flex:1;min-width:0;}
.rappel-lieu{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rappel-who{font-size:11px;color:var(--text-muted);margin-top:2px;display:flex;align-items:center;gap:5px;}
.rappel-date{font-size:10px;color:var(--text-muted);white-space:nowrap;letter-spacing:0.02em;}

/* ADMIN */
.admin-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.admin-info{flex:1;min-width:0;}
.admin-name{font-size:14px;font-weight:500;color:var(--text);}
.admin-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.admin-actions{display:flex;gap:6px;}
.empty-box{border:1px dashed var(--border);border-radius:12px;padding:22px;text-align:center;font-size:13px;color:var(--text-faint);}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,12,0.5);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--white);border-radius:22px 22px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:18px;color:var(--accent);}
.field{margin-bottom:13px;}
.field label{display:block;font-size:10px;font-weight:600;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;}
.field input,.field select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface);outline:none;transition:border-color 0.15s;}
.field input:focus,.field select:focus{border-color:var(--accent-mid);}
.modal-actions{display:flex;gap:8px;margin-top:18px;}
.modal-actions .btn{flex:1;padding:14px;}

/* CONFIRM */
.confirm-overlay{position:fixed;inset:0;background:rgba(10,20,12,0.55);z-index:600;display:none;align-items:flex-end;justify-content:center;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:var(--white);border-radius:22px 22px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));width:100%;max-width:600px;}
.confirm-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
.confirm-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:8px;color:var(--accent);}
.confirm-text{font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:22px;}
.confirm-actions{display:flex;gap:8px;}
.confirm-actions .btn{flex:1;padding:14px;}

/* COLOR PICKER */
.color-picker-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.color-opt{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s;}
.color-opt.selected{border-color:var(--text);transform:scale(1.15);}

/* CONFLICT POPUP */
.conflict-bg{position:fixed;inset:0;background:rgba(10,20,12,0.5);z-index:700;display:none;}
.conflict-bg.show{display:block;}
.conflict-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.88);background:var(--white);border-radius:20px;padding:28px 24px;width:300px;max-width:90vw;z-index:710;text-align:center;opacity:0;pointer-events:none;transition:all 0.22s;}
.conflict-popup.show{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1);}
.conflict-emoji{font-size:40px;margin-bottom:12px;}
.conflict-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--danger);margin-bottom:8px;}
.conflict-msg{font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:18px;}

/* LOGIN SCREEN */
.login-screen{position:fixed;inset:0;background:var(--bg);z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:opacity 0.4s;}
.login-screen.hidden{opacity:0;pointer-events:none;}
.login-logo{height:52px;width:auto;object-fit:contain;margin-bottom:20px;}
.login-subtitle{font-size:11px;color:var(--text-muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:32px;}
.login-grid{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px;align-items:center;}
.login-row{display:flex;justify-content:center;gap:12px;width:100%;}
.login-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:18px 14px;text-align:center;cursor:pointer;transition:all 0.2s;width:130px;flex-shrink:0;}
.login-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 16px rgba(28,74,46,0.1);}
.login-card:active{transform:scale(0.96);}
.login-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;margin:0 auto 10px;letter-spacing:0.02em;}
.login-name{font-size:13px;font-weight:500;color:var(--text);}

/* CONFETTI TRANSITION */
.confetti-screen{position:fixed;inset:0;z-index:850;pointer-events:none;display:none;}
.confetti-screen.active{display:block;}
.confetto{position:absolute;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(105vh) rotate(540deg);opacity:0;}}
.welcome-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:860;opacity:0;transition:opacity 0.4s;pointer-events:none;}
.welcome-msg.show{opacity:1;}
.welcome-name{font-family:'DM Serif Display',serif;font-size:32px;color:var(--accent);margin-bottom:6px;}
.welcome-sub{font-size:13px;color:var(--text-muted);letter-spacing:0.06em;}

/* TOAST */
.toast{position:fixed;bottom:calc(78px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(10px);background:var(--accent);color:white;padding:10px 22px;border-radius:20px;font-size:12px;font-weight:500;z-index:800;opacity:0;transition:all 0.2s;pointer-events:none;white-space:nowrap;letter-spacing:0.02em;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* POWERED */
.powered{position:fixed;bottom:calc(56px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);font-size:9px;color:var(--text);font-weight:600;pointer-events:none;white-space:nowrap;z-index:190;letter-spacing:0.04em;opacity:0.7;}
</style>
</head>

// HELPERS
function getM(d){return MONTHS[parseInt(d.split('-')[1])-1];}
function dNum(d){return parseInt(d.split('-')[2]);}
function dName(d){return DAYS[new Date(d+'T00:00:00').getDay()];}
function dUntil(d){const t=new Date();t.setHours(0,0,0,0);return Math.round((new Date(d+'T00:00:00')-t)/86400000);}
function fDate(d){const dt=new Date(d+'T00:00:00');return DAYS[dt.getDay()]+' '+dt.getDate()+' '+MONTHS[dt.getMonth()];}
function getC(name){const a=ANIMS.find(a=>a.name===name);return a?{dot:a.color_dot,bg:a.color_bg}:{dot:'#888780',bg:'#f1efe8'};}
function ini(name){if(!name||name==='?')return '?';const p=name.trim().split(' ');return(p.length>=2?p[0][0]+p[1][0]:name.substring(0,2)).toUpperCase();}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// EVENT CARD
function eCard(d,showAnim){
  const c=getC(d.animateur);
  const diff=dUntil(d.date);
  let rem='';
  if(diff>=0&&diff<=1)rem='<span class="tag tag-j1">J-1</span>';
  else if(diff>=0&&diff<=7)rem='<span class="tag tag-j7">J-'+diff+'</span>';
  return `<div class="event-card">
    <div class="event-date"><div class="event-date-num">${dNum(d.date)}</div><div class="event-date-day">${dName(d.date)}</div></div>
    <div class="event-body">
      <div class="event-lieu">${d.lieu}</div>
      <div class="event-tags">
        ${showAnim?`<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:${c.dot};letter-spacing:0.02em;"><span style="width:6px;height:6px;border-radius:50%;background:${c.dot};display:inline-block;"></span>${d.animateur}</span>`:''}
        <span class="tag ${d.slot==='Anim 1'?'tag-s1':'tag-s2'}">${d.slot}</span>
        ${d.format?'<span class="tag tag-fmt">'+d.format+'</span>':''} 
        ${!d.confirmed||d.animateur==='?'?'<span class="tag tag-tbd">À décerner</span>':''} 
        ${d.note?'<span class="tag tag-note">⚠ '+d.note+'</span>':''} 
        ${rem}
      </div>
    </div>
    <div class="event-actions">
      <button class="btn btn-secondary btn-icon" onclick="editEvent('${d.id}')" title="Modifier">✏️</button>
      <button class="btn btn-danger btn-icon" onclick="askDelEvent('${d.id}','${d.lieu.replace(/'/g,"\'")}','${d.date}')" title="Supprimer">🗑</button>
    </div>
  </div>`;
}

// RENDERS
function renderGeneral(){
  const counts={};ANIMS.forEach(a=>counts[a.name]=0);DATA.forEach(d=>{if(counts[d.animateur]!==undefined)counts[d.animateur]++;});
  const groups={'Juin':[],'Juillet':[],'Août':[]};DATA.forEach(d=>{const m=getM(d.date);if(groups[m])groups[m].push(d);});
  let html=`<div class="stats-scroll"><div class="stat-card"><div class="stat-val">${DATA.length}</div><div class="stat-lbl">Total</div></div>${ANIMS.map(a=>`<div class="stat-card" style="border-left:3px solid ${a.color_dot}"><div class="stat-val" style="color:${a.color_dot}">${counts[a.name]||0}</div><div class="stat-lbl">${a.name}</div></div>`).join('')}<div class="stat-card" style="border-left:3px solid #c0392b"><div class="stat-val" style="color:#8c2d1a">${DATA.filter(d=>!d.confirmed||d.animateur==='?').length}</div><div class="stat-lbl" style="color:#8c2d1a;">À décerner</div></div></div>`;
  Object.entries(groups).forEach(([m,items])=>{
    items.sort((a,b)=>a.date.localeCompare(b.date));
    html+=`<div class="month-header"><div class="month-title-txt">${m}</div><span class="month-badge">${items.length} anim.</span></div>`;
    if(!items.length)html+='<div class="empty-box">Aucune animation</div>';
    else items.forEach(d=>{html+=eCard(d,true);});
  });
  document.getElementById('view-general').innerHTML=html;
}

function renderRappels(){
  const soon=DATA.filter(d=>{const diff=dUntil(d.date);return diff>=0&&diff<=14;}).sort((a,b)=>a.date.localeCompare(b.date));
  const tbd=DATA.filter(d=>d.animateur==='?'||!d.confirmed).sort((a,b)=>a.date.localeCompare(b.date));
  const hasAlert=(soon.length+tbd.length)>0;
  document.getElementById('alert-dot').style.display=hasAlert?'inline-block':'none';
  document.getElementById('bnav-dot').style.display=hasAlert?'block':'none';
  let html=`<div class="section-title">🔔 Dans les 14 prochains jours</div>`;
  if(!soon.length)html+='<div class="empty-box">Aucune animation prochainement</div>';
  else soon.forEach(d=>{
    const diff=dUntil(d.date);const c=getC(d.animateur);
    const badge=diff<=1?'<span class="tag tag-j1">J-1</span>':diff<=7?`<span class="tag tag-j7">J-${diff}</span>`:`<span class="tag tag-ok">J-${diff}</span>`;
    html+=`<div class="rappel-card">${badge}<div class="rappel-info"><div class="rappel-lieu">${d.lieu}</div><div class="rappel-who"><span style="width:6px;height:6px;border-radius:50%;background:${c.dot};display:inline-block;"></span>${d.animateur}</div></div><div class="rappel-date">${fDate(d.date)}</div></div>`;
  });
  html+=`<div class="section-title" style="color:var(--danger);margin-top:24px;">⚠️ À décerner (${tbd.length})</div>`;
  if(!tbd.length)html+='<div class="empty-box">Tous les créneaux sont attribués ✓</div>';
  else tbd.forEach(d=>{html+=`<div class="rappel-card rappel-card-tbd"><span class="tag tag-tbd">À décerner</span><div class="rappel-info"><div class="rappel-lieu">${d.lieu}</div><div class="rappel-who" style="color:var(--warning);">${d.animateur}${d.note?' · '+d.note:''}</div></div><div class="rappel-date">${fDate(d.date)}</div></div>`;});
  document.getElementById('view-rappels').innerHTML=html;
}

function renderAnim(name){
  const myData=DATA.filter(d=>d.animateur===name).sort((a,b)=>a.date.localeCompare(b.date));
  const c=getC(name);
  let html=`<div class="anim-hero"><div class="anim-avatar-big" style="background:${c.bg};color:${c.dot};">${ini(name)}</div><div><div class="anim-hero-name">${name}</div><div class="anim-hero-meta">Animateur · NOA 2026</div><div class="anim-hero-stats"><div class="anim-stat"><strong>${myData.length}</strong>animations</div><div class="anim-stat"><strong>${myData.filter(d=>d.confirmed).length}</strong>confirmées</div><div class="anim-stat"><strong>${myData.filter(d=>!d.confirmed).length}</strong>à confirmer</div></div></div></div>`;
  ['Juin','Juillet','Août'].forEach(m=>{
    const mData=myData.filter(d=>getM(d.date)===m);
    html+=`<div class="month-header"><div class="month-title-txt">${m}</div><span class="month-badge">${mData.length} anim.</span></div>`;

    else mData.forEach(d=>{html+=eCard(d,false);});
    html+=`<button class="btn btn-dashed" onclick="openModalForAnim('${name}','${m}')">+ Ajouter en ${m}</button>`;
  });
  document.getElementById('view-animateur').innerHTML=html;
}

function renderAdmin(){
  let html=`<div class="section-title">Animateurs</div>`;

    const cnt=DATA.filter(d=>d.animateur===a.name).length;
    html+=`<div class="admin-card"><div class="nav-avatar" style="width:40px;height:40px;font-size:14px;background:${a.color_bg};color:${a.color_dot};">${ini(a.name)}</div><div class="admin-info"><div class="admin-name">${a.name}</div><div class="admin-sub">${cnt} animation${cnt!==1?'s':''}</div></div><div class="admin-actions"><button class="btn btn-secondary btn-icon" onclick="editProfil('${a.id}')">✏️</button><button class="btn btn-danger btn-icon" onclick="askDelAnim('${a.id}','${a.name}')">🗑</button></div></div>`;

  });
  document.getElementById('view-admin').innerHTML=html;
}

function buildAnimSel(sel){document.getElementById('f-anim').innerHTML=`<option value="?">— À décerner —</option>`+ANIMS.map(a=>`<option value="${a.name}"${a.name===sel?' selected':''} >${a.name}</option>`).join('');if(sel)document.getElementById('f-anim').value=sel;}
function openModal(type){
  if(type==='event'){document.getElementById('modal-event-title').textContent='Nouvelle animation';document.getElementById('f-id').value='';['f-date','f-lieu','f-format'].forEach(id=>document.getElementById(id).value='');document.getElementById('f-slot').value='Anim 1';document.getElementById('f-confirmed').value='1';buildAnimSel('');}
  else{document.getElementById('modal-profil-title').textContent='Ajouter un animateur';document.getElementById('fp-id').value='';document.getElementById('fp-name').value='';buildColorPicker(COLORS[0].name);}
  document.getElementById('modal-'+type).classList.add('open');
}
function openModalForAnim(name,month){openModal('event');buildAnimSel(name);const map={Juin:'2026-06-01',Juillet:'2026-07-01',Août:'2026-08-01'};if(map[month])document.getElementById('f-date').value=map[month];}
function editEvent(id){const d=DATA.find(d=>String(d.id)===String(id));if(!d)return;document.getElementById('modal-event-title').textContent="Modifier l'animation";document.getElementById('f-id').value=id;document.getElementById('f-date').value=d.date;document.getElementById('f-lieu').value=d.lieu;document.getElementById('f-format').value=d.format||'';;document.getElementById('f-slot').value=d.slot;document.getElementById('f-confirmed').value=d.confirmed?'1':'0';buildAnimSel(d.animateur);document.getElementById('modal-event').classList.add('open');}
function closeModal(type){document.getElementById('modal-'+type).classList.remove('open');}
async function saveEvent(){
  const id=document.getElementById('f-id').value;
  const date=document.getElementById('f-date').value;
  const lieu=document.getElementById('f-lieu').value.trim();
  const animateur=document.getElementById('f-anim').value||'?';
  const format=document.getElementById('f-format').value.trim();
  const slot=document.getElementById('f-slot').value;
  const confirmed=document.getElementById('f-confirmed').value==='1';
  if(!date||!lieu){alert('Merci de remplir la date et le lieu.');return;}
  if(hasConflict(animateur,date,id)){closeModal('event');showConflict(animateur,date);return;}
  const body={date,lieu,animateur,format,slot,confirmed,note:''};
  if(!id){const nid='local-'+Date.now();DATA.push({...body,id:nid});toast('Animation ajoutée ✓');if(sbReady){try{const r=await sbIns('animations',body);const idx=DATA.findIndex(d=>d.id===nid);if(idx>-1)DATA[idx]=r;}catch(e){}}}
  else{const idx=DATA.findIndex(d=>String(d.id)===String(id));if(idx>-1)DATA[idx]={...DATA[idx],...body};toast('Animation modifiée ✓');if(sbReady){try{await sbUpd('animations',id,body);}catch(e){}}}
  closeModal('event');refresh();
}

// PROFIL
function buildColorPicker(sel){document.getElementById('color-picker').innerHTML=COLORS.map(c=>`<div class="color-opt${c.name===sel?' selected':''}" style="background:${c.dot};" onclick="selectColor('${c.name}')" title="${c.name}"></div>`).join('');document.getElementById('fp-color').value=sel;}
function selectColor(name){document.querySelectorAll('.color-opt').forEach(o=>o.classList.remove('selected'));event.target.classList.add('selected');document.getElementById('fp-color').value=name;}
function editProfil(id){const a=ANIMS.find(a=>String(a.id)===String(id));if(!a)return;document.getElementById('modal-profil-title').textContent="Modifier l'animateur";document.getElementById('fp-id').value=id;document.getElementById('fp-name').value=a.name;buildColorPicker(a.color_name);document.getElementById('modal-profil').classList.add('open');}
async function saveProfil(){
  const id=document.getElementById('fp-id').value;
  const name=document.getElementById('fp-name').value.trim();
  const cn=document.getElementById('fp-color').value;
  const color=COLORS.find(c=>c.name===cn)||COLORS[0];
  if(!name){alert('Merci de saisir un prénom.');return;}
  const body={name,color_name:color.name,color_dot:color.dot,color_bg:color.bg,color_text:color.dot};
  if(!id){if(ANIMS.find(a=>a.name===name)){alert('Ce nom existe déjà.');return;}const nid='local-'+Date.now();ANIMS.push({...body,id:nid});toast('Animateur ajouté ✓');if(sbReady){try{const r=await sbIns('animateurs',body);const idx=ANIMS.findIndex(a=>a.id===nid);if(idx>-1)ANIMS[idx]=r;}catch(e){}}}
  else{const old=ANIMS.find(a=>String(a.id)===String(id))?.name;const idx=ANIMS.findIndex(a=>String(a.id)===String(id));if(idx>-1)ANIMS[idx]={...ANIMS[idx],...body};if(old&&old!==name){DATA.forEach(d=>{if(d.animateur===old)d.animateur=name;});if(sbReady){for(const d of DATA.filter(d=>d.animateur===name)){try{await sbUpd('animations',d.id,{animateur:name});}catch(e){}}}}toast('Animateur modifié ✓');if(sbReady){try{await sbUpd('animateurs',id,body);}catch(e){}}}
  closeModal('profil');buildDrawer();refresh();
}

// DELETE
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('open');}
function askDelEvent(id,lieu,date){document.getElementById('confirm-title').textContent='Supprimer cette animation ?';document.getElementById('confirm-text').innerHTML=`<strong>${lieu}</strong><br>${fDate(date)}`;document.getElementById('confirm-ok').onclick=()=>delEvent(id);document.getElementById('confirm-overlay').classList.add('open');}
function askDelAnim(id,name){const cnt=DATA.filter(d=>d.animateur===name).length;document.getElementById('confirm-title').textContent=`Supprimer ${name} ?`;document.getElementById('confirm-text').innerHTML=cnt>0?`<span style="color:var(--warning);">⚠️ ${cnt} animation${cnt>1?'s':''} ${cnt>1?'seront passées':'sera passée'} en mode <strong>« À décerner »</strong>.</span>`:'Cet animateur n'a aucune animation.';document.getElementById('confirm-ok').onclick=()=>delAnim(id,name);document.getElementById('confirm-overlay').classList.add('open');}
async function delEvent(id){DATA=DATA.filter(d=>String(d.id)!==String(id));closeConfirm();refresh();toast('Animation supprimée ✓');if(sbReady){try{await sbDel('animations',id);}catch(e){}}}
async function delAnim(id,name){DATA.forEach(d=>{if(d.animateur===name){d.animateur='?';d.confirmed=false;}});ANIMS=ANIMS.filter(a=>String(a.id)!==String(id));closeConfirm();buildDrawer();if(currentTab==='anim-'+name)navTo('general',null,'general');else refresh();toast('Animateur supprimé ✓');if(sbReady){try{for(const d of DATA){try{await sbUpd('animations',d.id,{animateur:'?',confirmed:false});}catch(e){}}await sbDel('animateurs',id);}catch(e){}}}

// LOGIN
function showLogin(){
  const grid=document.getElementById('login-grid');
  const rows=[];
  const perRow=2;
  for(let i=0;i<ANIMS.length;i+=perRow){
    const chunk=ANIMS.slice(i,i+perRow);
    const isLast=i+perRow>=ANIMS.length;
    const isOdd=ANIMS.length%perRow!==0&&isLast;
    rows.push(`<div class="login-row" style="${isOdd?'justify-content:center;':''}">${chunk.map(a=>`<div class="login-card" onclick="selectUser('${a.name}')"><div class="login-avatar" style="background:${a.color_bg};color:${a.color_dot};">${ini(a.name)}</div><div class="login-name">${a.name}</div></div>`).join('')}</div>`);
  }
  grid.innerHTML=rows.join('');
  document.getElementById('login-screen').classList.remove('hidden');
}
function selectUser(name){currentUser=name;launchConfetti(name);}
function switchUser(){document.getElementById('login-screen').classList.remove('hidden');document.getElementById('user-badge').style.display='none';}

// INIT
async function init(){
  ANIMS=DEF_ANIMS.map((a,i)=>({...a,id:'def-'+i}));
  DATA=DEF_EVENTS.map((d,i)=>({...d,id:'def-'+i}));
  buildDrawer();renderGeneral();renderRappels();
  showLogin();
  try{
    let anims=await sbGet('animateurs');
    let events=await sbGet('animations');
    if(anims.length===0){for(const a of DEF_ANIMS)await sbIns('animateurs',a);anims=await sbGet('animateurs');}
    if(events.length===0){for(const e of DEF_EVENTS)await sbIns('animations',e);events=await sbGet('animations');}
    ANIMS=anims;DATA=events;sbReady=true;
    buildDrawer();refresh();
    if(!document.getElementById('login-screen').classList.contains('hidden'))showLogin();
  }catch(e){console.warn('Mode hors-ligne');}
}
init();
</script>
