<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning NOA — Été 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f2ed;
  --surface: #faf8f5;
  --white: #ffffff;
  --border: #e2ddd6;
  --border-light: #ece9e2;
  --text: #1a1714;
  --text-muted: #7a746c;
  --text-faint: #b0a99f;
  --accent: #2d5a3d;
  --accent-light: #e8f0eb;
  --accent-mid: #4a8c5c;

  --cl: #1a4a8a; --cl-bg: #e8f0fb; --cl-light: #c5d9f5;
  --so: #0f5e47; --so-bg: #e2f4ed; --so-light: #a8dfc9;
  --ni: #8a1a4a; --ni-bg: #fbe8f0; --ni-light: #f5c0d6;
  --li: #3a6e18; --li-bg: #eaf4e2; --li-light: #bde0a0;
  --pi: #7a3e0a; --pi-bg: #faf0e3; --pi-light: #f0c890;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  min-height: 100vh;
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
}

.sidebar-brand {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border-light);
}
.brand-tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent-mid);
  margin-bottom: 6px;
}
.brand-name {
  font-family: 'DM Serif Display', serif;
  font-size: 24px;
  color: var(--text);
  line-height: 1.1;
}
.brand-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

.sidebar-section {
  padding: 16px 0;
}
.sidebar-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-faint);
  padding: 0 24px;
  margin-bottom: 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 24px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-muted);
  transition: all 0.15s;
  border-left: 3px solid transparent;
  text-decoration: none;
}
.nav-item:hover { background: var(--bg); color: var(--text); }
.nav-item.active {
  color: var(--text);
  background: var(--bg);
  border-left-color: var(--accent);
  font-weight: 500;
}

.nav-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  flex-shrink: 0;
}

.alert-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #e24b4a; margin-left: auto; flex-shrink: 0;
}

.sidebar-footer {
  margin-top: auto;
  padding: 16px 24px;
  border-top: 1px solid var(--border-light);
  font-size: 12px;
  color: var(--text-faint);
}

/* MAIN */
.main {
  margin-left: 240px;
  flex: 1;
  min-height: 100vh;
}

.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 16px 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-title { font-size: 20px; font-weight: 500; }
.topbar-sub { font-size: 13px; color: var(--text-muted); margin-top: 1px; }

.btn-add {
  display: flex; align-items: center; gap: 7px;
  padding: 9px 18px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.15s;
}
.btn-add:hover { background: #24492f; }
.btn-add svg { width: 15px; height: 15px; }

.content { padding: 32px 36px; }

/* VIEWS */
.view { display: none; }
.view.active { display: block; }

/* STATS ROW */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
}
.stat-val { font-size: 28px; font-weight: 600; color: var(--text); line-height: 1; }
.stat-lbl { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* PLANNING GENERAL TABLE */
.planning-wrap {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 24px;
}
.planning-month-header {
  padding: 14px 20px;
  background: var(--accent);
  color: white;
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.planning-month-header span { font-size: 13px; font-family: 'DM Sans', sans-serif; opacity: 0.8; }

table.plan {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
table.plan thead th {
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border-light);
  text-align: left;
  background: var(--surface);
}
table.plan tbody tr { border-bottom: 1px solid var(--border-light); transition: background 0.1s; }
table.plan tbody tr:last-child { border-bottom: none; }
table.plan tbody tr:hover { background: var(--bg); }
table.plan tbody td { padding: 11px 14px; vertical-align: middle; }

.date-cell { white-space: nowrap; }
.date-num { font-size: 20px; font-weight: 600; line-height: 1; }
.date-day { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

.anim-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px 4px 6px;
  border-radius: 20px;
  font-size: 12px; font-weight: 500;
}
.anim-dot { width: 7px; height: 7px; border-radius: 50%; }

.format-tag {
  display: inline-block;
  background: var(--accent-light);
  color: var(--accent);
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 6px;
}

.slot-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
}
.slot-1 { background: #e8f0fb; color: #1a4a8a; }
.slot-2 { background: #eaf4e2; color: #3a6e18; }

.tbd-tag {
  font-size: 11px;
  color: #ba7517;
  background: #faeeda;
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 500;
}
.confirm-tag {
  font-size: 11px;
  color: #993c1d;
  background: #faece7;
  padding: 2px 8px;
  border-radius: 6px;
}
.empty-row td { color: var(--text-faint); font-size: 12px; text-align: center; padding: 18px; }

/* ANIMATEUR VIEW */
.animateur-hero {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px 28px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.animateur-avatar-big {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700;
  flex-shrink: 0;
}
.animateur-name { font-family: 'DM Serif Display', serif; font-size: 26px; }
.animateur-meta { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
.animateur-stats { display: flex; gap: 20px; margin-top: 10px; }
.animateur-stat { font-size: 13px; }
.animateur-stat strong { display: block; font-size: 20px; font-weight: 600; line-height: 1.1; }

.month-block { margin-bottom: 24px; }
.month-title {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: var(--text);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-light);
  display: flex; align-items: center; gap: 10px;
}
.month-count { font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--text-muted); }

.anim-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 8px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.anim-card:hover { border-color: var(--accent-mid); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.card-date { min-width: 44px; text-align: center; }
.card-date-num { font-size: 22px; font-weight: 700; line-height: 1; color: var(--text); }
.card-date-day { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.card-body { flex: 1; }
.card-lieu { font-size: 15px; font-weight: 500; margin-bottom: 5px; }
.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
.reminder-j1 { background: #faece7; color: #993c1d; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 5px; }
.reminder-j7 { background: #faeeda; color: #633806; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 5px; }

.no-anim-month {
  border: 1px dashed var(--border);
  border-radius: 10px;
  padding: 18px;
  text-align: center;
  font-size: 13px;
  color: var(--text-faint);
}

/* RAPPELS VIEW */
.rappels-section { margin-bottom: 28px; }
.rappels-heading {
  display: flex; align-items: center; gap: 10px;
  font-size: 15px; font-weight: 600;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border-light);
}
.rappel-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 6px;
}
.rappel-info { flex: 1; }
.rappel-lieu { font-size: 14px; font-weight: 500; }
.rappel-who { font-size: 12px; color: var(--text-muted); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
.rappel-date { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

/* ADD MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(20,15,10,0.45);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--white);
  border-radius: 14px;
  padding: 28px 28px 24px;
  width: 440px;
  max-width: 95vw;
  box-shadow: 0 16px 48px rgba(0,0,0,0.15);
}
.modal-title {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  margin-bottom: 20px;
}
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
.field input, .field select {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 7px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  background: var(--surface);
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus { border-color: var(--accent-mid); }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
.btn-cancel {
  padding: 9px 18px;
  border: 1px solid var(--border);
  background: transparent;
  border-radius: 7px;
  font-size: 13px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  color: var(--text-muted);
  transition: all 0.15s;
}
.btn-cancel:hover { background: var(--bg); }

/* ANIMATIONS */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.view.active > * { animation: fadeIn 0.2s ease both; }

/* SCROLL */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-tag">Maison NOA</div>
    <div class="brand-name">Planning<br>Été 2026</div>
    <div class="brand-sub">Juin · Juillet · Août</div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Général</div>
    <a class="nav-item active" onclick="showView('general', this)">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Planning général
    </a>
    <a class="nav-item" onclick="showView('rappels', this)">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Rappels
      <span class="alert-dot" id="alert-dot"></span>
    </a>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Animateurs</div>
    <a class="nav-item" onclick="showView('anim-Clément', this)">
      <div class="nav-avatar" style="background:var(--cl-bg);color:var(--cl);">CL</div>
      Clément
    </a>
    <a class="nav-item" onclick="showView('anim-Solal', this)">
      <div class="nav-avatar" style="background:var(--so-bg);color:var(--so);">SO</div>
      Solal
    </a>
    <a class="nav-item" onclick="showView('anim-Nina', this)">
      <div class="nav-avatar" style="background:var(--ni-bg);color:var(--ni);">NI</div>
      Nina
    </a>
    <a class="nav-item" onclick="showView('anim-Lily', this)">
      <div class="nav-avatar" style="background:var(--li-bg);color:var(--li);">LI</div>
      Lily
    </a>
    <a class="nav-item" onclick="showView('anim-Pierre', this)">
      <div class="nav-avatar" style="background:var(--pi-bg);color:var(--pi);">PI</div>
      Pierre
    </a>
  </div>

  <div class="sidebar-footer">
    Maison NOA © 2026
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">Planning général</div>
      <div class="topbar-sub" id="topbar-sub">Toutes les animations · Été 2026</div>
    </div>
    <button class="btn-add" onclick="openModal()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouvelle animation
    </button>
  </div>

  <div class="content">

    <!-- PLANNING GÉNÉRAL -->
    <div id="view-general" class="view active">
      <div class="stats-row" id="stats-row"></div>
      <div id="general-tables"></div>
    </div>

    <!-- RAPPELS -->
    <div id="view-rappels" class="view">
      <div id="rappels-content"></div>
    </div>

    <!-- ANIMATEUR VIEWS (generated dynamically) -->
    <div id="view-anim-Clément" class="view"></div>
    <div id="view-anim-Solal" class="view"></div>
    <div id="view-anim-Nina" class="view"></div>
    <div id="view-anim-Lily" class="view"></div>
    <div id="view-anim-Pierre" class="view"></div>

  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">Ajouter une animation</div>
    <div class="field"><label>Date</label><input type="date" id="f-date" /></div>
    <div class="field"><label>Lieu / Enseigne</label><input type="text" id="f-lieu" placeholder="ex : Leclerc – Fouesnant (29)" /></div>
    <div class="field"><label>Animateur</label>
      <select id="f-animateur">
        <option value="">— choisir —</option>
        <option>Clément</option><option>Solal</option><option>Nina</option><option>Lily</option><option>Pierre</option>
      </select>
    </div>
    <div class="field"><label>Plage horaire (Format)</label><input type="text" id="f-format" placeholder="ex : 10-13 / 14-18" /></div>
    <div class="field"><label>Créneau</label>
      <select id="f-slot"><option value="Anim 1">Animation 1</option><option value="Anim 2">Animation 2</option></select>
    </div>
    <div class="field"><label>Confirmé</label>
      <select id="f-confirmed"><option value="1">Oui — confirmé</option><option value="0">Non — à confirmer</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-add" onclick="saveAnim()" style="border-radius:7px;">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

const ANIMATEURS = {
  'Clément': { bg:'var(--cl-bg)', color:'var(--cl)', initials:'CL', cssVar:'--cl' },
  'Solal':   { bg:'var(--so-bg)', color:'var(--so)', initials:'SO', cssVar:'--so' },
  'Nina':    { bg:'var(--ni-bg)', color:'var(--ni)', initials:'NI', cssVar:'--ni' },
  'Lily':    { bg:'var(--li-bg)', color:'var(--li)', initials:'LI', cssVar:'--li' },
  'Pierre':  { bg:'var(--pi-bg)', color:'var(--pi)', initials:'PI', cssVar:'--pi' },
  '?':       { bg:'#f1efe8', color:'#888780', initials:'?', cssVar:null },
};

let DATA = [
  {date:'2026-06-06',lieu:'Salon Gastro – Quintin',animateur:'Clément',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-06-12',lieu:'Plouharnel – Super U',animateur:'Clément',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-06-13',lieu:'Intermarché – Trémuson',animateur:'Lily',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-06-13',lieu:"Les Bouchées d'Alexandre – Plouharnel",animateur:'Clément',format:'',slot:'Anim 2',confirmed:false},
  {date:'2026-06-19',lieu:'Fouesnant – Leclerc',animateur:'?',format:'',slot:'Anim 1',confirmed:false},
  {date:'2026-06-26',lieu:'Cave Landerneau – Ty Ar Gwin',animateur:'Pierre',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-07-04',lieu:"Les Bouchées d'Alexandre – Plouharnel (56)",animateur:'?',format:'',slot:'Anim 2',confirmed:false},
  {date:'2026-07-06',lieu:'Camping St Malo – Ville huchet (35)',animateur:'Solal',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-07-07',lieu:'Camping Touesse – Dinard (35)',animateur:'Solal',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-07-08',lieu:"Camping Blé d'Or – St Cast le Guildo (35)",animateur:'Solal',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-07-09',lieu:'Camping Port Blanc – Dinard (35)',animateur:'Solal',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-07-10',lieu:'Fouesnant – Leclerc (29)',animateur:'Nina',format:'10-13 / 14-18',slot:'Anim 1',confirmed:false},
  {date:'2026-07-13',lieu:'Camping Le Milin – Pabu (22)',animateur:'Solal',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-07-14',lieu:'Camping Le Roch – Pordic (22)',animateur:'Solal',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-07-15',lieu:'Club des Goélands – Saint Briac (35)',animateur:'Clément',format:'',slot:'Anim 2',confirmed:false,note:'DATE À CONFIRMER'},
  {date:'2026-07-17',lieu:'Gueule de joie – Nantes (44)',animateur:'Nina',format:'',slot:'Anim 2',confirmed:false},
  {date:'2026-07-20',lieu:'Camping St Cado – Belz (56)',animateur:'Solal',format:'',slot:'Anim 1',confirmed:true},
  {date:'2026-08-08',lieu:"Les Bouchées d'Alexandre – Plouharnel (56)",animateur:'?',format:'',slot:'Anim 1',confirmed:false},
  {date:'2026-08-14',lieu:'Fouesnant – Leclerc (29)',animateur:'?',format:'',slot:'Anim 1',confirmed:false},
];

function getMonth(dateStr) { return MONTHS_FR[parseInt(dateStr.split('-')[1]) - 1]; }
function dayNum(d) { return parseInt(d.split('-')[2]); }
function dayName(d) { return DAYS[new Date(d + 'T00:00:00').getDay()]; }
function daysUntil(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((new Date(d + 'T00:00:00') - today) / 86400000);
}
function fmtDate(d) { const dt = new Date(d+'T00:00:00'); return DAYS[dt.getDay()]+' '+dt.getDate()+' '+MONTHS_FR[dt.getMonth()]; }

function animColor(name) {
  const n = name.replace(/\s*\?$/,'').trim();
  return ANIMATEURS[n] || ANIMATEURS['?'];
}

// VIEW SWITCHING
function showView(id, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  if (el) el.classList.add('active');

  const titles = {
    'general': ['Planning général', 'Toutes les animations · Été 2026'],
    'rappels': ['Rappels', 'Animations à venir et créneaux à confirmer'],
  };
  if (titles[id]) {
    document.getElementById('topbar-title').textContent = titles[id][0];
    document.getElementById('topbar-sub').textContent = titles[id][1];
  } else if (id.startsWith('anim-')) {
    const name = id.replace('anim-', '');
    document.getElementById('topbar-title').textContent = name;
    document.getElementById('topbar-sub').textContent = 'Planning personnel · Été 2026';
    renderAnimateur(name);
  }
  if (id === 'rappels') renderRappels();
  if (id === 'general') renderGeneral();
}

// GENERAL
function renderGeneral() {
  const counts = {};
  Object.keys(ANIMATEURS).forEach(k => { if(k!=='?') counts[k]=0; });
  DATA.forEach(d => { const n = d.animateur.replace(/\s*\?$/,'').trim(); if(counts[n]!==undefined) counts[n]++; });

  const statsEl = document.getElementById('stats-row');
  statsEl.innerHTML = `
    <div class="stat-card"><div class="stat-val">${DATA.length}</div><div class="stat-lbl">Animations total</div></div>
    ${Object.entries(counts).map(([k,v]) => {
      const c = animColor(k);
      return `<div class="stat-card" style="border-left:3px solid ${c.color}">
        <div class="stat-val">${v}</div>
        <div class="stat-lbl" style="display:flex;align-items:center;gap:5px;color:${c.color}"><span style="width:7px;height:7px;border-radius:50%;background:${c.color};display:inline-block;"></span>${k}</div>
      </div>`;
    }).join('')}
    <div class="stat-card" style="border-left:3px solid #e24b4a">
      <div class="stat-val">${DATA.filter(d=>!d.confirmed||d.animateur==='?').length}</div>
      <div class="stat-lbl" style="color:#993c1d;">À confirmer</div>
    </div>
  `;

  const monthGroups = { 'Juin': [], 'Juillet': [], 'Août': [] };
  DATA.forEach(d => {
    const m = getMonth(d.date);
    if (monthGroups[m]) monthGroups[m].push(d);
  });

  let html = '';
  Object.entries(monthGroups).forEach(([month, items]) => {
    items.sort((a,b) => a.date.localeCompare(b.date));
    html += `<div class="planning-wrap">
      <div class="planning-month-header">${month} <span>${items.length} animation${items.length>1?'s':''}</span></div>
      <table class="plan">
        <thead><tr>
          <th>Date</th><th>Lieu</th><th>Animateur</th><th>Plage horaire</th><th>Créneau</th><th>Statut</th>
        </tr></thead>
        <tbody>`;
    if (!items.length) {
      html += '<tr class="empty-row"><td colspan="6">Aucune animation ce mois</td></tr>';
    } else {
      items.forEach(d => {
        const c = animColor(d.animateur);
        const diff = daysUntil(d.date);
        let reminder = '';
        if (diff >= 0 && diff <= 1) reminder = '<span class="reminder-j1" style="margin-left:6px;">J-1</span>';
        else if (diff >= 0 && diff <= 7) reminder = '<span class="reminder-j7" style="margin-left:6px;">J-7</span>';
        html += `<tr>
          <td class="date-cell"><div class="date-num">${dayNum(d.date)}</div><div class="date-day">${dayName(d.date)}</div></td>
          <td><strong>${d.lieu}</strong>${d.note ? '<br><span class="confirm-tag" style="margin-top:3px;display:inline-block;">⚠ '+d.note+'</span>' : ''}${reminder}</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="width:28px;height:28px;border-radius:50%;background:${c.bg};color:${c.color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;">${c.initials}</div>
              ${d.animateur}
            </div>
          </td>
          <td>${d.format ? '<span class="format-tag">'+d.format+'</span>' : '<span style="color:var(--text-faint);font-size:12px;">—</span>'}</td>
          <td><span class="slot-badge ${d.slot==='Anim 1'?'slot-1':'slot-2'}">${d.slot}</span></td>
          <td>${!d.confirmed || d.animateur==='?' ? '<span class="tbd-tag">À confirmer</span>' : '<span style="font-size:12px;color:var(--accent);">✓ Confirmé</span>'}</td>
        </tr>`;
      });
    }
    html += '</tbody></table></div>';
  });
  document.getElementById('general-tables').innerHTML = html;
}

// RAPPELS
function renderRappels() {
  const today = new Date(); today.setHours(0,0,0,0);
  const soon = DATA.filter(d => { const diff = daysUntil(d.date); return diff >= 0 && diff <= 14; })
    .sort((a,b) => a.date.localeCompare(b.date));
  const tbd = DATA.filter(d => d.animateur === '?' || !d.confirmed)
    .sort((a,b) => a.date.localeCompare(b.date));

  document.getElementById('alert-dot').style.display = (soon.length + tbd.length) > 0 ? 'inline-block' : 'none';

  let html = '';
  html += `<div class="rappels-section">
    <div class="rappels-heading">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Prochaines animations (14 jours)
      <span style="font-size:12px;font-weight:400;color:var(--text-muted);">${soon.length} animation${soon.length>1?'s':''}</span>
    </div>`;
  if (!soon.length) {
    html += '<div style="font-size:13px;color:var(--text-muted);padding:16px;background:var(--white);border:1px solid var(--border);border-radius:8px;">Aucune animation dans les 14 prochains jours.</div>';
  } else {
    soon.forEach(d => {
      const diff = daysUntil(d.date);
      const c = animColor(d.animateur);
      let badge = '';
      if (diff <= 1) badge = '<span class="reminder-j1">J-'+diff+'</span>';
      else if (diff <= 7) badge = '<span class="reminder-j7">J-'+diff+'</span>';
      else badge = '<span style="background:#e8f0eb;color:var(--accent);font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;">J-'+diff+'</span>';
      html += `<div class="rappel-row">
        ${badge}
        <div class="rappel-info">
          <div class="rappel-lieu">${d.lieu}</div>
          <div class="rappel-who">
            <span style="width:7px;height:7px;border-radius:50%;background:${c.color};display:inline-block;"></span>
            ${d.animateur}
          </div>
        </div>
        <div class="rappel-date">${fmtDate(d.date)}</div>
      </div>`;
    });
  }
  html += '</div>';

  html += `<div class="rappels-section">
    <div class="rappels-heading" style="color:#993c1d;">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Créneaux à confirmer
      <span style="font-size:12px;font-weight:400;color:var(--text-muted);">${tbd.length} animation${tbd.length>1?'s':''}</span>
    </div>`;
  tbd.forEach(d => {
    html += `<div class="rappel-row" style="border-left:3px solid #f09595;">
      <span class="tbd-tag">À confirmer</span>
      <div class="rappel-info">
        <div class="rappel-lieu">${d.lieu}${d.note ? ' — <em style="font-size:12px;">'+d.note+'</em>' : ''}</div>
        <div class="rappel-who" style="color:#ba7517;">${d.animateur}</div>
      </div>
      <div class="rappel-date">${fmtDate(d.date)}</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('rappels-content').innerHTML = html;
}

// ANIMATEUR
function renderAnimateur(name) {
  const myData = DATA.filter(d => d.animateur.replace(/\s*\?$/,'').trim() === name)
    .sort((a,b) => a.date.localeCompare(b.date));
  const c = animColor(name);
  const months = ['Juin','Juillet','Août'];

  let html = `<div class="animateur-hero">
    <div class="animateur-avatar-big" style="background:${c.bg};color:${c.color};">${c.initials}</div>
    <div>
      <div class="animateur-name">${name}</div>
      <div class="animateur-meta">Animateur · Maison NOA Été 2026</div>
      <div class="animateur-stats">
        <div class="animateur-stat"><strong>${myData.length}</strong>animation${myData.length>1?'s':''}</div>
        <div class="animateur-stat"><strong>${myData.filter(d=>d.confirmed).length}</strong>confirmée${myData.filter(d=>d.confirmed).length>1?'s':''}</div>
        <div class="animateur-stat"><strong>${myData.filter(d=>!d.confirmed).length}</strong>à confirmer</div>
      </div>
    </div>
  </div>`;

  months.forEach(m => {
    const mData = myData.filter(d => getMonth(d.date) === m);
    html += `<div class="month-block">
      <div class="month-title">${m} <span class="month-count">${mData.length} animation${mData.length!==1?'s':''}</span></div>`;
    if (!mData.length) {
      html += `<div class="no-anim-month">Aucune animation en ${m}</div>`;
    } else {
      mData.forEach(d => {
        const diff = daysUntil(d.date);
        let rem = '';
        if (diff >= 0 && diff <= 1) rem = '<span class="reminder-j1">J-1</span>';
        else if (diff >= 0 && diff <= 7) rem = '<span class="reminder-j7">J-7</span>';
        html += `<div class="anim-card">
          <div class="card-date">
            <div class="card-date-num">${dayNum(d.date)}</div>
            <div class="card-date-day">${dayName(d.date)}</div>
          </div>
          <div class="card-body">
            <div class="card-lieu">${d.lieu}</div>
            <div class="card-meta">
              <span class="slot-badge ${d.slot==='Anim 1'?'slot-1':'slot-2'}">${d.slot}</span>
              ${d.format ? '<span class="format-tag">'+d.format+'</span>' : ''}
              ${!d.confirmed ? '<span class="tbd-tag">À confirmer</span>' : '<span style="font-size:11px;color:var(--accent);font-weight:500;">✓ Confirmé</span>'}
              ${d.note ? '<span class="confirm-tag">⚠ '+d.note+'</span>' : ''}
              ${rem}
            </div>
          </div>
        </div>`;
      });
    }
    html += `<button class="btn-add" onclick="openModal('${name}','${m}')" style="margin-top:8px;width:100%;justify-content:center;border-radius:8px;background:transparent;color:var(--accent);border:1px dashed var(--accent-mid);font-size:13px;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Ajouter une animation en ${m}
    </button>`;
    html += '</div>';
  });

  document.getElementById('view-anim-' + name).innerHTML = html;
}

// MODAL
function openModal(animateur, month) {
  if (animateur) document.getElementById('f-animateur').value = animateur;
  if (month) {
    const map = {Juin:'2026-06-01',Juillet:'2026-07-01',Août:'2026-08-01'};
    if (map[month]) document.getElementById('f-date').value = map[month];
  }
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  ['f-date','f-lieu','f-format'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-animateur').value='';
  document.getElementById('f-slot').value='Anim 1';
  document.getElementById('f-confirmed').value='1';
}
function saveAnim() {
  const date = document.getElementById('f-date').value;
  const lieu = document.getElementById('f-lieu').value.trim();
  const animateur = document.getElementById('f-animateur').value;
  const format = document.getElementById('f-format').value.trim();
  const slot = document.getElementById('f-slot').value;
  const confirmed = document.getElementById('f-confirmed').value === '1';
  if (!date || !lieu || !animateur) { alert('Merci de remplir la date, le lieu et l\'animateur.'); return; }
  DATA.push({date, lieu, animateur, format, slot, confirmed});
  closeModal();
  renderGeneral();
  renderRappels();
  const activeView = document.querySelector('.view.active');
  if (activeView && activeView.id.startsWith('view-anim-')) renderAnimateur(activeView.id.replace('view-anim-',''));
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// INIT
renderGeneral();
renderRappels();
</script>
</body>
</html>
